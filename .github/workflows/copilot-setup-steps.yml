name: Copilot Setup Steps

on:
  workflow_dispatch:
  push:
    paths:
      - .github/workflows/copilot-setup-steps.yml
  pull_request:
    paths:
      - .github/workflows/copilot-setup-steps.yml

jobs:
  copilot-setup-steps:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    timeout-minutes: 30
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Install Determinate Nix
        uses: DeterminateSystems/determinate-nix-action@v3.21.2
        with:
          github-token: ${{ github.token }}

      - name: Prepare local bin directory
        run: |
          mkdir -p "$HOME/.local/bin"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Install just
        run: |
          curl -fsSL \
            https://github.com/casey/just/releases/download/1.54.0/just-1.54.0-x86_64-unknown-linux-musl.tar.gz \
            -o /tmp/just.tar.gz
          tar -xzf /tmp/just.tar.gz -C "$HOME/.local/bin" just

      - name: Install fd
        run: |
          curl -fsSL \
            https://github.com/sharkdp/fd/releases/download/v10.4.2/fd_10.4.2_amd64.deb \
            -o /tmp/fd.deb
          sudo dpkg -i /tmp/fd.deb

      - name: Install nixfmt
        run: |
          nix profile install nixpkgs#nixfmt-rfc-style

      - name: Verify toolchain
        run: |
          nix --version
          just --version
          fd --version
          nixfmt --version
